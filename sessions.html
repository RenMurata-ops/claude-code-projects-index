  { id: "sectionIdle",        state: "idle",         num: "III", title: "待機・バッチワーカー", caption: "Idle / batch worker" }
];

const ESC = { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" };
function esc(s) { return String(s == null ? "" : s).replace(/[&<>"']/g, c => ESC[c]); }
function pad(n, w) { return String(n).padStart(w, "0"); }

function renderBand() {
  const total = SESSIONS.length;
  const waiting = SESSIONS.filter(s => s.state === "user-waiting" || s.state === "stuck").length;
  const running = SESSIONS.filter(s => s.state === "running").length;
  const idle    = SESSIONS.filter(s => s.state === "idle").length;
  document.getElementById("band").innerHTML = `
    <div class="cell"><div class="lbl">Total</div><div class="num mono">${pad(total, 2)}</div></div>
    <div class="cell"><div class="lbl">要返答</div><div class="num mono live">${pad(waiting, 2)}</div></div>
    <div class="cell"><div class="lbl">自走中</div><div class="num mono">${pad(running, 2)}</div></div>
    <div class="cell"><div class="lbl">待機</div><div class="num mono">${pad(idle, 2)}</div></div>
  `;
}

function renderSection(sec) {
  const root = document.getElementById(sec.id);
  const list = SESSIONS
    .filter(s => s.state === sec.state)
    .sort((a, b) => (b.lastActivity || "").localeCompare(a.lastActivity || ""));
  if (list.length === 0) { root.innerHTML = ""; return; }

  let html = `
    <header class="sec-head">
      <span class="sec-no mono">${esc(sec.num)}</span>
      <h2 class="sec-title serif">${esc(sec.title)}</h2>
      <span class="sec-cap">${esc(sec.caption)} · ${pad(list.length, 2)}</span>
    </header>
  `;
  list.forEach((s, idx) => {
    html += `
      <article class="session">
        <header class="session-head">
          <h3 class="session-name serif">${esc(s.project)}</h3>
          <span class="session-state state-${esc(s.state)}">${esc(s.stateLabel)}</span>
        </header>
        <div class="session-topic">${esc(s.topic)}</div>
        <dl class="meta-line">
          <span class="pair"><dt>Last</dt><dd class="mono">${esc(s.lastActivity)}</dd></span>
          <span class="pair"><dt>Started</dt><dd class="mono">${esc(s.started)} (${esc(s.etime)})</dd></span>
          ${s.pid ? `<span class="pair"><dt>PID</dt><dd class="mono">${esc(s.pid)}</dd></span>` : ""}
          <span class="pair path"><dt>Path</dt><dd class="mono">${esc(s.cwd)}</dd></span>
          <span class="pair"><dt>Session</dt><dd class="mono">${esc(s.sessionId.slice(0, 8))}…</dd></span>
        </dl>
        <dl class="convo">
          <dt class="convo-k">User</dt>
          <dd class="convo-v">${esc(s.lastUser)}</dd>
          <dt class="convo-k">Assistant</dt>
          <dd class="convo-v assistant">${esc(s.lastAssistant)}</dd>
        </dl>
        <div class="reason"><span class="lbl">Status</span>${esc(s.stateReason)}</div>
      </article>
    `;
  });
  root.innerHTML = html;
}

(function init() {
  const d = new Date();
  document.getElementById("dateline").textContent =
    d.getFullYear() + "." + pad(d.getMonth() + 1, 2) + "." + pad(d.getDate(), 2);
  document.getElementById("generatedAt").textContent =
    d.getFullYear() + "." + pad(d.getMonth() + 1, 2) + "." + pad(d.getDate(), 2) +
    " " + pad(d.getHours(), 2) + ":" + pad(d.getMinutes(), 2);
  renderBand();
  for (const sec of STATE_SECTIONS) renderSection(sec);
})();
</script>
</body>
</html>
